{% extends "base.html" %}

{% block content %}
<div class="row mt-4 justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Edit Placement Drive</h2>
            <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form action="{{ url_for('edit_drive', drive_id=drive.id) }}" method="POST">

                    <div class="mb-3">
                        <label for="job_title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" id="job_title" name="job_title"
                            value="{{ drive.job_title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description</label>
                        <textarea class="form-control" id="job_description" name="job_description" rows="4"
                            required>{{ drive.job_description }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                        <textarea class="form-control" id="eligibility_criteria" name="eligibility_criteria" rows="3"
                            required>{{ drive.eligibility_criteria }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="required_skills" class="form-label">Required Skills</label>
                        <input type="text" class="form-control" id="required_skills" name="required_skills"
                            value="{{ drive.required_skills }}" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="experience" class="form-label">Experience Required</label>
                            <input type="number" class="form-control" id="experience" name="experience"
                                value="{{ drive.experience }}" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label for="salary_range" class="form-label">Salary Range (in LPA)</label>
                            <input type="number" class="form-control" id="salary_range" name="salary_range"
                                value="{{ drive.salary_range }}" min="0" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="is_active" class="form-label">Drive Status (Accepting Applications)</label>
                        <select class="form-select" id="is_active" name="is_active" required>
                            <option value="yes" {% if drive.is_active %}selected{% endif %}>Active</option>
                            <option value="no" {% if not drive.is_active %}selected{% endif %}>Closed</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="application_deadline" class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" id="application_deadline" name="application_deadline"
                            value="{{ drive.application_deadline.strftime('%Y-%m-%d') }}" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Update Drive</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
