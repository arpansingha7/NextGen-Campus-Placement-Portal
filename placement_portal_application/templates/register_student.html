{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100" style="margin-top: -90px; padding-top: 90px;">
    <div class="col-md-8 col-lg-7 delay-1">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header border-bottom-0 text-center pt-4 pb-2">
                <div class="d-inline-flex align-items-center justify-content-center p-3 rounded-circle mb-3 shadow-sm" style="background: rgba(16, 185, 129, 0.1); color: #34d399;">
                    <i class="bi bi-person-plus fs-1"></i>
                </div>
                <h3 class="fw-bold text-white mb-1">Student Registration</h3>
                <p class="text-muted small">Create your profile to start applying</p>
            </div>
            <div class="card-body p-4 p-md-5 pt-3">
                <form action="{{ url_for('register_student') }}" method="POST" enctype="multipart/form-data">

                    <div class="row mb-4">
                        <div class="col-md-6 mb-4 mb-md-0">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control bg-transparent" id="name" name="name" placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6">
                            <label for="student_roll_id" class="form-label">Student ID / Roll Number</label>
                            <input type="text" class="form-control bg-transparent" id="student_roll_id" name="student_roll_id" placeholder="e.g. CS2024001" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-4 mb-md-0">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control bg-transparent" id="email" name="email" placeholder="john@student.edu" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
                        </div>
                        <div class="col-md-6">
                            <label for="contact" class="form-label">Contact Number</label>
                            <input type="tel" class="form-control bg-transparent" id="contact" name="contact" placeholder="+1 234 567 8900" pattern="^\+?\d{10,15}$" title="Enter a valid phone number (10-15 digits)" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-4 mb-md-0">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control bg-transparent" id="password" name="password" minlength="6" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-6">
                            <label for="resume" class="form-label">Resume (PDF, DOC, DOCX)</label>
                            <input type="file" class="form-control bg-transparent text-muted" id="resume" name="resume" accept=".pdf,.doc,.docx">
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Register Account <i class="bi bi-arrow-right ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
